name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. التحقق من الـ Git Tags ومقارنتها
  check-tags:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      local_tag: ${{ steps.compare.outputs.local_tag }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # مهم جداً لجلب كل الـ Tags من السيرفر

      - name: 🔍 Compare Git Tags
        id: compare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. جلب أحدث Tag محلي في الـ Git
          LATEST_LOCAL_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest local Git Tag: $LATEST_LOCAL_TAG"
          
          # 2. جلب آخر Release Tag على GitHub
          LATEST_RELEASE_TAG=$(gh release view --json tagName --template '{{.tagName}}' 2>/dev/null || echo "v0.0.0")
          echo "Latest GitHub Release Tag: $LATEST_RELEASE_TAG"
          
          # تنظيف الأسماء من حرف v لتسهيل المقارنة الرقمية
          LOCAL_VERSION=${LATEST_LOCAL_TAG#v}
          RELEASE_VERSION=${LATEST_RELEASE_TAG#v}
          
          # 3. مقارنة الإصدارات بدقة باستخدام Node.js
          SHOULD_BUILD=$(node -e "
            const local = '$LOCAL_VERSION'.split('.').map(Number);
            const release = '$RELEASE_VERSION'.split('.').map(Number);
            let shouldBuild = false;
            for (let i = 0; i < Math.max(local.length, release.length); i++) {
              const l = local[i] || 0;
              const r = release[i] || 0;
              if (l > r) { shouldBuild = true; break; }
              if (l < r) { break; }
            }
            console.log(shouldBuild);
          ")
          
          echo "Should build: $SHOULD_BUILD"
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "local_tag=$LATEST_LOCAL_TAG" >> $GITHUB_OUTPUT

  # 2. وظيفة الفحص والـ Lint (تعمل فقط إذا كان هناك Tag محلي أحدث)
  lint-and-check:
    needs: check-tags
    if: needs.check-tags.outputs.should_build == 'true' && needs.check-tags.outputs.local_tag != 'v0.0.0'
    runs-on: ubuntu-latest
    name: 🔍 Lint & Type Check
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm run lint || true

      - name: ✅ TypeScript type check
        run: npx tsc --noEmit || true

  # 3. وظيفة البناء والـ Release
  build-android:
    needs: [check-tags, lint-and-check]
    if: needs.check-tags.outputs.should_build == 'true' && needs.check-tags.outputs.local_tag != 'v0.0.0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            echo "⚠️ No keystore provided, building unsigned APK"
          fi

      - name: 🏗️ Build Release APK
        run: |
          cd android
          if [ -f app/release.keystore ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} \
              -Dorg.gradle.jvmargs="-Xmx4096m"
          else
            ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m"
          fi

      - name: 📝 Rename APK
        run: |
          cd android/app/build/outputs/apk/release/
          # استخدام الـ Tag المحلي الذي تم التحقق منه
          TAG="${{ needs.check-tags.outputs.local_tag }}"
          VERSION="${TAG#v}"
          
          if [ -f "app-release.apk" ]; then
            mv app-release.apk spy-game-${VERSION}.apk
          elif [ -f "app-universal-release.apk" ]; then
            mv app-universal-release.apk spy-game-${VERSION}.apk
          else
            echo "❌ No APK file found for renaming!"
            exit 1
          fi

      - name: 🚀 Create Release and Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-tags.outputs.local_tag }}"
          VERSION="${TAG#v}"
          
          # استخدام GitHub CLI لإنشاء الـ Release ورفع الملف تلقائياً
          gh release create "$TAG" \
            --target master \
            --title "🕵️ Spy Game $TAG" \
            --notes "تحديث تلقائي جديد للإصدار $TAG" \
            android/app/build/outputs/apk/release/spy-game-${VERSION}.apk
