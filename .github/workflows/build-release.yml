name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    name: 🔍 Lint & Type Check

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 💾 Restore pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm run lint || true

      - name: ✅ TypeScript type check
        run: npx tsc --noEmit || true

  build-android:
    runs-on: ubuntu-latest
    needs: lint-and-check
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 💾 Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            echo "⚠️ No keystore provided, building unsigned APK"
          fi

      - name: 🏗️ Build Release APK
        run: |
          cd android
          echo "Starting Gradle build..."
          if [ -f app/release.keystore ]; then
            echo "✅ Keystore found, building signed APK"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} \
              -Dorg.gradle.jvmargs="-Xmx4096m"
          else
            echo "⚠️ No keystore, building unsigned APK"
            ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m"
          fi
          echo "✅ Build completed"

      - name: 📂 List APK files
        run: |
          echo "=== Looking for APK files ==="
          find android/app/build/outputs -name "*.apk" -type f || echo "❌ No APK found!"
          ls -lh android/app/build/outputs/apk/release/ || echo "Directory not found"

      - name: 📊 Check APK size
        run: |
          APK_FILE=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -f "$APK_FILE" ]; then
            SIZE=$(du -h "$APK_FILE" | cut -f1)
            echo "✅ APK File: $(basename $APK_FILE)"
            echo "📏 APK Size: $SIZE"
          else
            echo "❌ APK file not found!"
            exit 1
          fi

      - name: 📝 Rename APK
        run: |
          cd android/app/build/outputs/apk/release/
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          
          if [ -f "app-release.apk" ]; then
            echo "Found: app-release.apk"
            mv app-release.apk spy-game-${VERSION}.apk
          elif [ -f "app-universal-release.apk" ]; then
            echo "Found: app-universal-release.apk"
            mv app-universal-release.apk spy-game-${VERSION}.apk
          else
            echo "Listing available files:"
            ls -la
            echo "❌ No APK file found for renaming!"
            exit 1
          fi
          
          ls -lh spy-game-*.apk

      - name: 📁 Check workspace before release
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Looking for APK files ==="
          find . -name "spy-game-*.apk" -type f || echo "No renamed APK found"
          find . -name "*.apk" -type f 2>/dev/null | head -10

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 🕵️ Spy Game ${{ github.ref_name }}
          body: |
            ## 🕵️ Spy Game ${{ github.ref_name }}
            
            ### 📱 التحميل
            - قم بتحميل ملف APK وتثبيته على جهازك الأندرويد
            
            ### 📝 متطلبات التثبيت
            - Android 5.0 (API 21) وما فوق
            - قد تحتاج للسماح بالتثبيت من مصادر غير معروفة
            
            ### ✨ المميزات
            - لعبة حفلات ممتعة بالعربية
            - 11 فئة تصنيف متنوعة
            - 3 أنماط ألوان (فاتح، داكن، نيون)
            - سجل الأبطال وتاريخ المباريات
            - رسوم متحركة سلسة وتصميم عصري
            
            ### 🔄 التحديثات الأخيرة
            - إزالة المؤقت من مرحلة الأسئلة
            - شاشة جديدة لإدخال اسم الجاسوس
            - 9 تصنيفات جديدة
            - تحسينات الواجهة (UX/UI)
          files: |
            android/app/build/outputs/apk/release/spy-game-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
